[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
wrap          = "no"
tab_size      = 2
max_width     = 1200
max_height    = 1200
image_delay   = 30
image_filter  = "triangle"
image_quality = 90


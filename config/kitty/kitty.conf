# ============================================================================
#  kitty.conf — configuracion profesional — kitty + Dracula
#  Tema: Dracula  |  Fuente: Hack Nerd Font Mono  |  Transparencia + blur
#  Recargar en caliente: ctrl+shift+f5
# ============================================================================

# --- Tema Dracula (toda la UI) ---
include dracula.conf

# ============================ FUENTE ========================================
font_family      Hack Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Ligaduras (Hack no las trae; se deja el ajuste por si cambias de fuente).
# Con el cursor encima, muestra los caracteres individuales para editar comodo.
disable_ligatures cursor

# Ajuste fino de la rejilla de texto.
modify_font cell_height 105%
text_composition_strategy platform

# =========================== CURSOR ========================================
cursor_shape           beam
cursor_beam_thickness  1.6
cursor_blink_interval  0
cursor_stop_blinking_after 0
# Estela suave del cursor (efecto pro, kitty >= 0.36).
cursor_trail            3
cursor_trail_decay      0.1 0.4
cursor_trail_start_threshold 2

# ========================= TRANSPARENCIA ===================================
# KWin (KDE Wayland) soporta transparencia real + desenfoque.
background_opacity         0.88
dynamic_background_opacity yes
background_blur            48
background_tint            0.0

# ========================== SCROLLBACK =====================================
scrollback_lines               20000
scrollback_pager_history_size  256
scrollback_fill_enlarged_window yes
# El pager por defecto de kitty (less con colores y numero de linea) es optimo.
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ============================= URLs ========================================
detect_urls        yes
url_style          curly
open_url_with      default
underline_hyperlinks hover
url_prefixes       http https file ftp ssh git mailto

# ============================= RATON =======================================
copy_on_select        yes
strip_trailing_spaces smart
mouse_hide_wait       3.0
focus_follows_mouse   no
select_by_word_characters @-./_~?&=%+#

# ============================ VENTANA ======================================
remember_window_size    yes
initial_window_width    120c
initial_window_height   32c
window_padding_width    8
placement_strategy      center
hide_window_decorations no
confirm_os_window_close 0
inactive_text_alpha     0.85
enabled_layouts         splits:split_axis=horizontal,stack,tall,fat,grid
window_border_width      1.0pt
draw_minimal_borders     yes

# ============================= TABS ========================================
tab_bar_edge         bottom
tab_bar_style        powerline
tab_powerline_style  slanted
tab_bar_min_tabs     2
tab_activity_symbol  " "
bell_on_tab          no
tab_title_template   "{index}: {title}"

# ============================ CAMPANA / SILENCIO ===========================
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell no
notify_on_cmd_finish never

# ========================= INTEGRACION SHELL ===============================
shell_integration    enabled
# El shell de login (bash) hace el handoff al zsh del terminal-kit.
shell                .
editor               .
term                 xterm-kitty

# ========================= CONTROL REMOTO ==================================
# Permite scriptear kitty (paneles, envio de texto, etc.) — util pro.
allow_remote_control yes
listen_on            unix:@mykitty

# ============================================================================
#  ATAJOS DE TECLADO  (kitty_mod = ctrl+shift)
# ============================================================================
kitty_mod ctrl+shift

# --- Config / clipboard ---
map kitty_mod+f5   load_config_file
map kitty_mod+f6   debug_config
map kitty_mod+c    copy_to_clipboard
map kitty_mod+v    paste_from_clipboard

# --- Scroll / scrollback ---
map kitty_mod+k    scroll_line_up
map kitty_mod+j    scroll_line_down
map kitty_mod+page_up   scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home scroll_home
map kitty_mod+end  scroll_end
map kitty_mod+h    show_scrollback

# --- Ventanas / splits ---
map kitty_mod+enter new_window_with_cwd
map kitty_mod+w     close_window
map kitty_mod+]     next_window
map kitty_mod+[     previous_window
map kitty_mod+f     move_window_forward
map kitty_mod+b     move_window_backward
map ctrl+alt+left   neighboring_window left
map ctrl+alt+right  neighboring_window right
map ctrl+alt+up     neighboring_window up
map ctrl+alt+down   neighboring_window down
map kitty_mod+r     start_resizing_window

# --- Pestañas ---
map kitty_mod+t         new_tab_with_cwd
map kitty_mod+q         close_tab
map kitty_mod+right     next_tab
map kitty_mod+left      previous_tab
map kitty_mod+.         move_tab_forward
map kitty_mod+,         move_tab_backward
map kitty_mod+alt+t     set_tab_title

# --- Layouts / ventana OS ---
map kitty_mod+l     next_layout
map kitty_mod+n     new_os_window_with_cwd

# --- Tamaño de fuente ---
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+plus  change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+0     change_font_size all 0

# --- Transparencia en vivo ---
map kitty_mod+a>m   set_background_opacity +0.05
map kitty_mod+a>l   set_background_opacity -0.05
map kitty_mod+a>1   set_background_opacity 1
map kitty_mod+a>d   set_background_opacity default

# --- Hints: abrir URL, copiar rutas/lineas/hashes ---
map kitty_mod+e     open_url_with_hints
map kitty_mod+p>f   kitten hints --type path --program -
map kitty_mod+p>l   kitten hints --type line --program -
map kitty_mod+p>h   kitten hints --type hash --program -
map kitty_mod+p>n   kitten hints --type linenum

# --- Utilidades ---
map kitty_mod+u        kitten unicode_input
map kitty_mod+delete   clear_terminal reset active
map kitty_mod+f2       edit_config_file

# ============================ RENDIMIENTO ==================================
repaint_delay    10
input_delay      3
sync_to_monitor  yes
wayland_titlebar_color background
